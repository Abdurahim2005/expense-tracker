{% extends 'base.html' %}
{% block content %}
<style>
    /* Premium Shishasimon Forma Kartasi */
    .form-card {
        background: rgba(20, 20, 25, 0.55);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 24px;
        padding: 40px;
    }
    
    .form-title {
        color: #ffffff;
        font-weight: 700;
        letter-spacing: -0.5px;
    }

    .form-label {
        color: rgba(255, 255, 255, 0.6) !important;
        font-weight: 500;
        font-size: 0.9rem;
        margin-bottom: 8px;
    }

    /* === Kategoriya ochilgandagi xiralikni yo'qotuvchi qism === */
    .form-select option {
        background-color: #120917 !important; /* Ochilgan ro'yxat foni to'q qorong'i */
        color: #ffffff !important;           /* Matn rangini tiniq oq qiladi */
    }

    /* Asosiy Neon Ko'k Tugma */
    .btn-cyan {
        background: #22d3ee;
        color: #08080c;
        font-weight: 600;
        border-radius: 12px;
        padding: 14px;
        border: none;
        transition: all 0.2s ease;
    }
    .btn-cyan:hover {
        background: #06b6d4;
        box-shadow: 0 0 20px rgba(34, 211, 238, 0.4);
        color: #000000;
    }
</style>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="form-card shadow-lg">
            <h3 class="mb-4 text-center form-title">Yangi xarajat qo'shish</h3>
            
            <form method="post">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label">Kategoriya</label>
                    <select name="category" class="form-select" required>
                        {% for cat in categories %}
                            <option value="{{ cat.id }}">{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Summasi (UZS)</label>
                    <input type="number" step="0.01" name="amount" class="form-control" placeholder="Masalan: 50000" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Izoh (ixtiyoriy)</label>
                    <textarea name="description" class="form-control" rows="3" placeholder="Xarajat haqida qisqacha..."></textarea>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Sana</label>
                    <input type="date" name="date" class="form-control">
                </div>
                
                <button type="submit" class="btn btn-cyan w-100">Saqlash</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
